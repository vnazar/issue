name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Build gem
        run: gem build issue.gemspec

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" issue-*.gem --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
